<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Fashion Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#f4f4f4;
}
header{
    background:black;
    color:white;
    padding:15px;
    text-align:center;
    font-size:24px;
}
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}
.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    overflow:hidden;
    transition:0.3s;
}
.card:hover{
    transform:scale(1.05);
}
.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}
.card-content{
    padding:15px;
}
.price{
    color:#e91e63;
    font-weight:bold;
}
button{
    background:black;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#e91e63;
}
.cart{
    position:fixed;
    top:20px;
    right:20px;
    background:#e91e63;
    padding:10px 15px;
    border-radius:50px;
    color:white;
    cursor:pointer;
}
#checkout{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<header>Luxury Fashion Store</header>

<div class="cart" onclick="openCheckout()">
Cart 🛒 (<span id="cart-count">0</span>)
</div>

<div class="container">
    
    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
        <div class="card-content">
            <h3>Premium T-Shirt</h3>
            <p class="price">$40</p>
            <button onclick="addToCart(40)">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
        <div class="card-content">
            <h3>Luxury Jacket</h3>
            <p class="price">$120</p>
            <button onclick="addToCart(120)">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
        <div class="card-content">
            <h3>Modern Hoodie</h3>
            <p class="price">$75</p>
            <button onclick="addToCart(75)">Add to Cart</button>
        </div>
    </div>

</div>

<div id="checkout">
    <h2>Checkout</h2>
    <p>Total: $<span id="total">0</span></p>
    <button onclick="pay()">Pay with Card</button>
</div>

<script>
let total = 0;
let count = 0;

function addToCart(price){
    total += price;
    count++;
    document.getElementById("cart-count").innerText = count;
}

function openCheckout(){
    document.getElementById("checkout").style.display="block";
    document.getElementById("total").innerText = total;
}
